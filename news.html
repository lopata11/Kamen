<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | Администрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ Городская Администрация</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Госуслуги</a></li>
                    <li class="nav-item"><a class="nav-link active" href="news.html">Новости</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacts.html">Контакты</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Лента новостей</h2>
            <!-- Кнопка вызова окна добавления -->
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addNewsModal">
                ✏️ Добавить новость
            </button>
        </div>
        
        <!-- Сюда JavaScript будет вставлять новости -->
        <div id="news-container">
            <!-- Новости появятся здесь автоматически -->
        </div>
    </div>

    <!-- Модальное окно (Форма добавления новости) -->
    <div class="modal fade" id="addNewsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Создание новости</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="newsForm">
                        <div class="mb-3">
                            <label class="form-label">Заголовок</label>
                            <input type="text" class="form-control" id="newsTitle" placeholder="Например: Открытие парка" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Текст новости</label>
                            <textarea class="form-control" id="newsText" rows="4" placeholder="Опишите событие..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Опубликовать</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 bg-dark mt-5 text-white">
        <div class="container text-center"><p>© 2023 Администрация города.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Скрипт для работы новостей -->
    <script>
        // 1. Получаем элементы со страницы
        const newsContainer = document.getElementById('news-container');
        const newsForm = document.getElementById('newsForm');
        const modalElement = document.getElementById('addNewsModal');
        const modal = new bootstrap.Modal(modalElement);

        // 2. Функция для получения новостей из памяти браузера
        function getNews() {
            const storedNews = localStorage.getItem('cityNews');
            // Если новостей нет, возвращаем дефолтный список
            if (!storedNews) {
                return [
                    {
                        title: "Ремонт дороги на улице Ленина завершен",
                        date: "20 Октября 2023",
                        text: "Подрядчик сдал объект на 3 дня раньше срока. Движение полностью восстановлено."
                    },
                    {
                        title: "Городской субботник",
                        date: "18 Октября 2023",
                        text: "Приглашаем всех неравнодушных принять участие в уборке парков в эту субботу."
                    }
                ];
            }
            return JSON.parse(storedNews);
        }

        // 3. Функция для отображения новостей на странице
        function renderNews() {
            const newsList = getNews();
            newsContainer.innerHTML = ''; // Очищаем контейнер перед отрисовкой

            newsList.forEach(news => {
                const article = document.createElement('article');
                article.className = 'card mb-4';
                article.innerHTML = `
                    <div class="card-body">
                        <h3 class="card-title">${news.title}</h3>
                        <h6 class="card-subtitle mb-2 text-muted">Опубликовано: ${news.date}</h6>
                        <p class="card-text">${news.text}</p>
                    </div>
                `;
                // Добавляем новую новость в начало списка
                newsContainer.prepend(article); 
            });
        }

        // 4. Обработка отправки формы
        newsForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем перезагрузку страницы

            const titleInput = document.getElementById('newsTitle');
            const textInput = document.getElementById('newsText');

            // Создаем объект новой новости
            const newNews = {
                title: titleInput.value,
                text: textInput.value,
                date: new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
            };

            // Получаем старые новости, добавляем новую и сохраняем обратно
            const currentNews = getNews();
            currentNews.push(newNews);
            localStorage.setItem('cityNews', JSON.stringify(currentNews));

            // Очищаем форму и закрываем окно
            newsForm.reset();
            modal.hide();

            // Перерисовываем список
            renderNews();
            alert('Новость успешно опубликована!');
        });

        // Запускаем отрисовку при загрузке страницы
        renderNews();
    </script>
</body>
</html>
